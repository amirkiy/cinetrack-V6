<!DOCTYPE html>
<html lang="fa" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTrack AI Ultimate Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===================== MODERN DARK THEME ===================== */
    :root {
      --bg-main: #0a0a0a;
      --bg-surface: #141414;
      --bg-card: #1e1e1e;
      --bg-hover: #2a2a2a;
      --accent: #e50914;
      --accent-hover: #b81d24;
      --text-main: #ffffff;
      --text-secondary: #e0e0e0;
      --text-muted: #9ca3af;
      --border: #333333;
      --shadow: 0 8px 30px rgba(0,0,0,0.5);
      --cyan: #00bcd4;
      --green: #2e7d32;
      --gold: #ffc107;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; transition: all 0.2s ease-in-out; }

    body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; padding-bottom: 60px; }

    /* ===================== HEADER ===================== */
    header {
      background: rgba(20, 20, 20, 0.85);
      border-bottom: 1px solid var(--border);
      padding: 15px 30px; display: flex; justify-content: space-between;
      align-items: center; position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px); flex-wrap: wrap; gap: 15px;
    }

    .brand { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .brand-accent { color: var(--accent); }
    .brand-badge { font-size: 10px; background: var(--accent); color: #fff; padding: 3px 6px; border-radius: 4px; font-weight: 800;}

    /* ===================== SEARCH ===================== */
    .search-container { position: relative; width: 40%; max-width: 600px; min-width: 250px; }
    .search-wrapper { display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 30px; padding: 4px 15px; }
    .search-wrapper input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-size: 14px; outline: none; }
    .search-wrapper input::placeholder { color: var(--text-muted); }
    .search-wrapper button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
    
    .search-dropdown { position: absolute; top: 110%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); max-height: 400px; overflow-y: auto; z-index: 200; box-shadow: var(--shadow); display: none; }
    .search-item { display: flex; gap: 15px; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; }
    .search-item:hover { background: var(--bg-hover); }
    .search-item img { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; background: #333; }
    .search-item h4 { font-size: 14px; margin-bottom: 4px; color: var(--text-main); }
    .search-item p { font-size: 12px; color: var(--text-muted); }

    /* ===================== BUTTONS ===================== */
    .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-secondary:hover { background: var(--bg-hover); border-color: #555; }
    .btn-success { background: var(--green); }
    .btn-success:hover { background: #388e3c; }
    .btn-danger { background: rgba(229, 9, 20, 0.1); color: var(--accent); border: 1px solid rgba(229, 9, 20, 0.3); }
    .btn-danger:hover { background: var(--accent); color: #fff; }

    /* ===================== HERO SECTION ===================== */
    .hero-section { margin: 30px; background: var(--bg-surface); border-radius: var(--radius-lg); padding: 30px; border: 1px solid var(--border); position: relative; min-height: 350px; display: flex; align-items: center; box-shadow: var(--shadow); }
    .hero-empty { text-align: center; width: 100%; color: var(--text-muted); font-size: 16px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .hero-content { display: flex; gap: 40px; width: 100%; align-items: flex-start; }
    .hero-poster { width: 220px; height: 330px; object-fit: cover; border-radius: var(--radius-md); box-shadow: 0 10px 25px rgba(0,0,0,0.8); border: 1px solid var(--border); }
    .hero-details { flex: 1; min-width: 0; }
    .hero-title { font-size: 36px; font-weight: 900; margin-bottom: 15px; color: #fff; line-height: 1.2; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; font-size: 13px; color: var(--text-secondary); align-items: center; }
    
    .badge { background: var(--bg-hover); padding: 4px 10px; border-radius: 4px; font-weight: 600; color: var(--text-secondary); border: 1px solid var(--border); }
    .badge-accent { background: rgba(229, 9, 20, 0.1); color: var(--accent); border-color: rgba(229, 9, 20, 0.3); }
    .badge-quality { background: rgba(0, 188, 212, 0.1); color: var(--cyan); border-color: rgba(0, 188, 212, 0.3); }
    .badge-imdb { background: rgba(255, 193, 7, 0.1); color: var(--gold); border-color: rgba(255, 193, 7, 0.3); }

    .hero-extended-info { background: var(--bg-card); padding: 20px; border-radius: var(--radius-md); margin-bottom: 20px; border: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .extended-row { font-size: 13px; line-height: 1.6; color: var(--text-secondary); }
    .extended-row strong { color: var(--cyan); margin-right: 5px; }
    
    .hero-plot { font-size: 14px; line-height: 1.8; color: var(--text-muted); margin-bottom: 25px; max-width: 900px; text-align: justify; }

    /* ===================== QUALITY & PROGRESS PANELS ===================== */
    .action-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 15px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .panel-title { font-size: 14px; font-weight: 700; color: var(--cyan); display: flex; align-items: center; gap: 8px;}
    
    /* ===================== CONTROLS & GRID ===================== */
    .section-title { margin: 30px 30px 15px 30px; font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: #fff; }
    
    .controls-bar { margin: 0 30px 25px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; background: var(--bg-surface); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .filters-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .filter-btn:hover { background: var(--bg-hover); color: #fff; }
    .filter-btn.active { background: var(--text-main); color: var(--bg-main); border-color: var(--text-main); }
    
    .form-control { background: var(--bg-main); color: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: var(--radius-sm); outline: none; font-size: 13px; }
    .form-control:focus { border-color: var(--cyan); }

    .main-grid { margin: 0 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

    /* ===================== CARDS ===================== */
    .movie-card { background: var(--bg-surface); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); position: relative; cursor: pointer; display: flex; flex-direction: column; }
    .movie-card:hover { transform: scale(1.02); border-color: #555; z-index: 10; box-shadow: var(--shadow); }
    .movie-card.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(229, 9, 20, 0.2); }
    
    .card-poster-wrapper { position: relative; width: 100%; aspect-ratio: 2/3; background: var(--bg-card); }
    .card-poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    
    .quality-badge-absolute { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: var(--cyan); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; border: 1px solid rgba(0, 188, 212, 0.4); backdrop-filter: blur(4px); z-index: 2; }
    
    .card-info { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta-line { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }

    /* ===================== MODALS ===================== */
    .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 300; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; }
    .modal-backdrop.active { opacity: 1; pointer-events: auto; }
    .modal-box { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); padding: 25px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .modal-header h3 { font-size: 18px; color: #fff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); font-weight: 600; }
    
    .stars-rating { display: flex; gap: 5px; font-size: 24px; cursor: pointer; color: #333; direction: ltr; }
    .stars-rating span.active { color: var(--gold); text-shadow: 0 0 10px rgba(255,193,7,0.3); }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 900px) {
      .hero-content { flex-direction: column; align-items: center; }
      .hero-poster { width: 180px; height: 270px; }
      .hero-extended-info { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .controls-bar { flex-direction: column; align-items: stretch; }
      header { flex-direction: column; padding: 15px; }
      .search-container { width: 100%; }
      .main-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin: 0 15px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand"><span class="brand-accent">Cine</span>Track <span class="brand-badge">ULTIMATE</span></div>
    
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="جستجوی آنلاین (OMDb/TMDB)..." oninput="handleOnlineSearch(this.value)">
        <button onclick="clearSearchInput()">✖</button>
      </div>
      <div id="searchDropdown" class="search-dropdown"></div>
    </div>

    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="openModal('notesModal')" id="btnNotes">📝 یادداشت‌ها</button>
      <button class="btn btn-secondary" onclick="openModal('settingsModal')" id="btnSettings">⚙️ تنظیمات</button>
    </div>
  </header>

  <section class="section-title" id="titleWatchNext">🎯 پیشنهاد تماشای بعدی</section>
  <div id="watchNextContainer" style="margin: 0 30px;"></div>

  <section class="hero-section" id="heroSection"></section>

  <section class="section-title" id="titleLibrary">📚 کتابخانه شما</section>
  <section class="controls-bar">
    <div class="search-wrapper" style="width: 100%; max-width: 300px; margin-bottom: 10px;">
      <input type="text" id="localSearchInput" placeholder="جستجو در کتابخانه محلی..." oninput="renderGrid()">
    </div>
    <div class="filters-group" id="filterContainer">
      <button class="filter-btn active" onclick="setFilter('status', 'all')" id="fltAll">همه</button>
      <button class="filter-btn" onclick="setFilter('status', 'Watching')" id="fltWatching">⏳ در حال تماشا</button>
      <button class="filter-btn" onclick="setFilter('status', 'Planned')" id="fltPlanned">📅 برنامه‌ریزی</button>
      <button class="filter-btn" onclick="setFilter('status', 'Completed')" id="fltCompleted">✅ تمام شده</button>
      <button class="filter-btn" onclick="setFilter('type', 'movie')" id="fltMovies">🎬 فیلم‌ها</button>
      <button class="filter-btn" onclick="setFilter('type', 'series')" id="fltSeries">📺 سریال‌ها</button>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px;">
      <select class="form-control" id="genreFilterSelect" onchange="renderGrid()">
        <option value="all">فیلتر ژانر (همه)</option>
      </select>
      <select class="form-control" id="qualityFilterSelect" onchange="renderGrid()">
        <option value="all">فیلتر کیفیت (همه)</option>
        <option value="4K HDR">4K HDR</option>
        <option value="4K">4K</option>
        <option value="REMUX">REMUX</option>
        <option value="BluRay">BluRay</option>
        <option value="WEB-DL">WEB-DL</option>
        <option value="WEBRip">WEBRip</option>
        <option value="HDRip">HDRip</option>
        <option value="HDTS">HDTS</option>
        <option value="TC">TC</option>
        <option value="TS">TS</option>
        <option value="CAM">CAM</option>
      </select>
      <select class="form-control" id="sortSelect" onchange="renderGrid()">
        <option value="dateAdded">تاریخ اضافه شدن (جدیدترین)</option>
        <option value="title">عنوان (الفبا)</option>
        <option value="imdb">امتیاز IMDb</option>
        <option value="year">سال ساخت</option>
        <option value="userRating">امتیاز من</option>
      </select>
    </div>
  </section>

  <main class="main-grid" id="mainGrid"></main>

  <div class="modal-backdrop" id="addModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="lblAddTitle">اضافه کردن به آرشیو</h3>
        <button class="btn btn-secondary" style="padding:4px 8px;" onclick="closeModal('addModal')">✖</button>
      </div>
      <div id="addModalContent"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="progressModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="lblProgressTitle">⚙️ بروزرسانی وضعیت</h3>
        <button class="btn btn-secondary" style="padding:4px 8px;" onclick="closeModal('progressModal')">✖</button>
      </div>
      <div id="progressModalContent"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="lblSettingsTitle">⚙️ تنظیمات سیستم</h3>
        <button class="btn btn-secondary" style="padding:4px 8px;" onclick="closeModal('settingsModal')">✖</button>
      </div>
      
      <div class="form-group">
        <label id="lblLang">زبان / Language:</label>
        <select id="languageSelect" class="form-control">
          <option value="fa">فارسی (Persian)</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="form-group">
        <label>TMDB API Key (برای دیتای فارسی):</label>
        <input type="text" id="tmdbKeyInput" class="form-control" placeholder="eyJh...">
        <small style="color:var(--text-muted); font-size:11px;">با وارد کردن کلید TMDB، خلاصه داستان و ژانرها به زبان فارسی دریافت می‌شوند.</small>
      </div>

      <div style="border-top: 1px solid var(--border); margin: 20px 0; padding-top: 20px; display: flex; gap: 10px;">
        <button class="btn btn-secondary" style="flex:1;" onclick="exportLibrary()" id="btnExport">📤 خروجی بکاپ</button>
        <button class="btn btn-secondary" style="flex:1;" onclick="document.getElementById('importFileInput').click()" id="btnImport">📥 ورود بکاپ</button>
        <input type="file" id="importFileInput" style="display:none;" accept=".json" onchange="importLibrary(event)">
      </div>

      <button class="btn" style="width:100%;" onclick="saveSettings()" id="btnSaveSettings">ذخیره تنظیمات</button>
    </div>
  </div>

  <div class="modal-backdrop" id="notesModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="lblNotesTitle">📝 یادداشت‌های من</h3>
        <button class="btn btn-secondary" style="padding:4px 8px;" onclick="closeModal('notesModal')">✖</button>
      </div>
      <div class="form-group">
        <textarea id="generalNotesTextArea" class="form-control" style="min-height: 300px; resize: vertical;" oninput="saveGeneralNotes(this.value)"></textarea>
      </div>
    </div>
  </div>

  <script>
    /* ===================== CONFIG & STATE ===================== */
    const OMDB_KEY = "4b0254f3";
    const QUALITIES = ['نامشخص', 'CAM', 'TS', 'TC', 'HDTS', 'HDRip', 'WEBRip', 'WEB-DL', 'BluRay', 'REMUX', '4K', '4K HDR'];
    
    let state = {
      items: JSON.parse(localStorage.getItem("cinetrack_ultimate_db") || "[]"),
      selectedId: null,
      filters: { status: 'all', type: 'all' },
      language: localStorage.getItem("cinetrack_language") || "fa",
      tmdbKey: localStorage.getItem("cinetrack_tmdb_key") || ""
    };

    let searchDebounceTimer;

    /* ===================== I18N DICTIONARY ===================== */
    const dict = {
      fa: {
        searchPlace: "جستجوی آنلاین (OMDb/TMDB)...", searchLocal: "جستجو در کتابخانه محلی...",
        btnNotes: "📝 یادداشت‌ها", btnSettings: "⚙️ تنظیمات",
        watchNext: "🎯 پیشنهاد تماشای بعدی", library: "📚 کتابخانه شما",
        all: "همه", watching: "⏳ در حال تماشا", planned: "📅 برنامه‌ریزی", completed: "✅ تمام شده",
        movies: "🎬 فیلم‌ها", series: "📺 سریال‌ها",
        sortAdd: "تاریخ اضافه شدن (جدیدترین)", sortTitle: "عنوان (الفبا)", sortImdb: "امتیاز IMDb", sortYear: "سال ساخت", sortUser: "امتیاز من",
        emptyHero: "یک فیلم یا سریال را از آرشیو انتخاب کنید.",
        emptyGrid: "هیچ موردی یافت نشد.", emptyWatchNext: "موردی برای تماشای بعدی یافت نشد.",
        plotEmpty: "خلاصه داستانی برای این اثر ثبت نشده است.",
        genre: "ژانر", director: "کارگردان", actors: "بازیگران", country: "کشور", runtime: "زمان", quality: "کیفیت",
        season: "فصل", episode: "قسمت", totalEp: "کل قسمت‌ها", totalSea: "کل فصل‌ها",
        editStatus: "بروزرسانی وضعیت", save: "ذخیره تغییرات", delete: "حذف از آرشیو", personalRating: "امتیاز شما:",
        lblAddTitle: "اضافه کردن به آرشیو", lblSettingsTitle: "⚙️ تنظیمات سیستم", btnExport: "📤 خروجی بکاپ", btnImport: "📥 ورود بکاپ",
        statusWatching: "در حال تماشا", statusPlanned: "برنامه‌ریزی شده", statusCompleted: "تمام شده",
        typeMovie: "فیلم سینمایی", typeSeries: "سریال تلویزیونی", unknown: "نامشخص",
        nextEp: "قسمت بعدی", startWatch: "شروع تماشا"
      },
      en: {
        searchPlace: "Search Online (OMDb/TMDB)...", searchLocal: "Search local library...",
        btnNotes: "📝 Notes", btnSettings: "⚙️ Settings",
        watchNext: "🎯 Watch Next", library: "📚 Your Library",
        all: "All", watching: "⏳ Watching", planned: "📅 Planned", completed: "✅ Completed",
        movies: "🎬 Movies", series: "📺 Series",
        sortAdd: "Date Added (Newest)", sortTitle: "Title (A-Z)", sortImdb: "IMDb Rating", sortYear: "Release Year", sortUser: "My Rating",
        emptyHero: "Select a movie or series from your library.",
        emptyGrid: "No items found matching the criteria.", emptyWatchNext: "No items available to watch next.",
        plotEmpty: "No plot summary available for this item.",
        genre: "Genre", director: "Director", actors: "Actors", country: "Country", runtime: "Runtime", quality: "Quality",
        season: "Season", episode: "Episode", totalEp: "Total Episodes", totalSea: "Total Seasons",
        editStatus: "Update Status", save: "Save Changes", delete: "Delete from Library", personalRating: "Your Rating:",
        lblAddTitle: "Add to Library", lblSettingsTitle: "⚙️ System Settings", btnExport: "📤 Export Backup", btnImport: "📥 Import Backup",
        statusWatching: "Watching", statusPlanned: "Planned", statusCompleted: "Completed",
        typeMovie: "Movie", typeSeries: "TV Series", unknown: "Unknown",
        nextEp: "Next Episode", startWatch: "Start Watching"
      }
    };

    function t(key) { return dict[state.language][key] || key; }

    /* ===================== INIT & CORE ===================== */
    function init() {
      applyLanguage();
      document.getElementById("tmdbKeyInput").value = state.tmdbKey;
      document.getElementById("languageSelect").value = state.language;
      document.getElementById("generalNotesTextArea").value = localStorage.getItem("cinetrack_general_notes") || "";
      
      // Data Migration (adding missing fields to old data)
      state.items.forEach(item => {
        if(!item.quality) item.quality = "نامشخص";
        if(!item.totalEpisodes) item.totalEpisodes = "N/A";
        if(!item.country) item.country = "N/A";
      });
      saveState();
      
      extractAndRenderGenres();
      renderGrid();
      renderHero();
      renderWatchNext();
    }

    function saveState() {
      localStorage.setItem("cinetrack_ultimate_db", JSON.stringify(state.items));
      extractAndRenderGenres();
      renderWatchNext();
    }

    function applyLanguage() {
      document.documentElement.lang = state.language;
      document.documentElement.dir = state.language === 'fa' ? 'rtl' : 'ltr';
      
      document.getElementById("searchInput").placeholder = t('searchPlace');
      document.getElementById("localSearchInput").placeholder = t('searchLocal');
      document.getElementById("btnNotes").innerHTML = t('btnNotes');
      document.getElementById("btnSettings").innerHTML = t('btnSettings');

    function extractAndRenderGenres() {
      const select = document.getElementById("genreFilterSelect");
      const currentSelected = select.value;
      const allGenres = new Set();
      state.items.forEach(item => {
        if (item.genre && item.genre !== "N/A") {
          item.genre.split(',').forEach(g => allGenres.add(g.trim()));
        }
      });
      let html = `<option value="all">${t('genre')} (${t('all')})</option>`;
      Array.from(allGenres).sort().forEach(g => {
        html += `<option value="${g}" ${currentSelected === g ? 'selected' : ''}>${g}</option>`;
      });
      select.innerHTML = html;
    }

    /* ===================== API INTEGRATION (OMDb + TMDB) ===================== */
    async function handleOnlineSearch(val) {
      clearTimeout(searchDebounceTimer);
      const dropdown = document.getElementById("searchDropdown");
      if (!val || val.trim().length < 2) { dropdown.style.display = "none"; return; }

      searchDebounceTimer = setTimeout(async () => {
        try {
          // Base search via OMDb
          const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(val.trim())}&apikey=${OMDB_KEY}`);
          const data = await res.json();
          if (data.Response === "True" && data.Search) {
            dropdown.innerHTML = data.Search.slice(0, 8).map(item => `
              <div class="search-item" onclick="fetchAndShowAddModal('${item.imdbID}')">
                <img src="${item.Poster !== 'N/A' ? item.Poster : 'https://via.placeholder.com/150?text=No+Cover'}">
                <div>
                  <h4>${item.Title}</h4>
                  <p>${item.Year} | ${item.Type === 'movie' ? t('typeMovie') : t('typeSeries')}</p>
                </div>
              </div>
            `).join('');
            dropdown.style.display = "block";
          } else {
            dropdown.innerHTML = `<div style="padding:15px; text-align:center; color:var(--text-muted);">${t('emptyGrid')}</div>`;
            dropdown.style.display = "block";
          }
        } catch (err) { console.error(err); }
      }, 500);
    }

    function clearSearchInput() {
      document.getElementById("searchInput").value = "";
      document.getElementById("searchDropdown").style.display = "none";
    }

    async function fetchAndShowAddModal(imdbID) {
      clearSearchInput();
      try {
        // 1. Fetch from OMDb
        const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbID}&plot=full&apikey=${OMDB_KEY}`);
        let omdbData = await omdbRes.json();
        if (omdbData.Response === "False") return;

        // 2. Try TMDB for Persian translation if language is FA and TMDB key exists
        let tmdbData = null;
        let finalPlot = omdbData.Plot;
        let finalGenre = omdbData.Genre;
        let backdrop = null;

        if (state.language === 'fa' && state.tmdbKey) {
          const tmdbSearch = await fetch(`https://api.themoviedb.org/3/find/${imdbID}?api_key=${state.tmdbKey}&external_source=imdb_id&language=fa-IR`);
          const tmdbSearchData = await tmdbSearch.json();
          
          let tmdbItem = null;
          let tmdbType = 'movie';
          if (tmdbSearchData.movie_results && tmdbSearchData.movie_results.length > 0) { tmdbItem = tmdbSearchData.movie_results[0]; }
          else if (tmdbSearchData.tv_results && tmdbSearchData.tv_results.length > 0) { tmdbItem = tmdbSearchData.tv_results[0]; tmdbType = 'tv'; }

          if (tmdbItem) {
            // Fetch full details from TMDB
            const tmdbDetailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbItem.id}?api_key=${state.tmdbKey}&language=fa-IR`);
            tmdbData = await tmdbDetailsRes.json();
            
            if (tmdbData.overview) finalPlot = tmdbData.overview;
            if (tmdbData.genres && tmdbData.genres.length > 0) finalGenre = tmdbData.genres.map(g => g.name).join(', ');
            if (tmdbData.backdrop_path) backdrop = `https://image.tmdb.org/t/p/w1280${tmdbData.backdrop_path}`;
            if (tmdbType === 'tv' && tmdbData.number_of_episodes) omdbData.totalEpisodes = tmdbData.number_of_episodes;
          }
        }

        const fullData = {
          ...omdbData,
          PlotTranslated: finalPlot,
          GenreTranslated: finalGenre,
          Backdrop: backdrop
        };

        showAddModal(fullData);
      } catch(err) { console.error(err); }
    }

    function showAddModal(data) {
      const content = document.getElementById("addModalContent");
      
      const qualityOptions = QUALITIES.map(q => `<option value="${q}">${q}</option>`).join('');

          <img src="${data.Poster !== 'N/A' ? data.Poster : 'https://via.placeholder.com/100x150'}" style="width:70px; height:100px; object-fit:cover; border-radius:4px;">
          <div>
            <h4 style="font-size:16px; font-weight:700; color:#fff;">${data.Title}</h4>
            <p style="color:var(--text-muted); font-size:12px; margin:4px 0;">${data.Year} | ${data.GenreTranslated}</p>
            <span class="badge badge-imdb" style="font-size:11px;">IMDb: ⭐ ${data.imdbRating}</span>
          </div>
        </div>
        <div class="form-group">
          <label>وضعیت / Status:</label>
          <select id="addStatusSelect" class="form-control" style="width:100%;">

    function confirmAddItem(apiData) {
      if (state.items.some(i => i.imdbID === apiData.imdbID)) {
        alert("Already in library! / از قبل در آرشیو موجود است!");
        closeModal('addModal'); return;
      }

      const status = document.getElementById("addStatusSelect").value;
      const quality = document.getElementById("addQualitySelect").value;

      const newItem = {
        id: 'item_' + Date.now(),
        imdbID: apiData.imdbID,
        title: apiData.Title,
        year: apiData.Year,
        poster: apiData.Poster,
        backdrop: apiData.Backdrop || null,
        genre: apiData.GenreTranslated || apiData.Genre,
        type: apiData.Type,
        plot: apiData.PlotTranslated || apiData.Plot || '',
        imdbRating: apiData.imdbRating || 'N/A',
        imdbVotes: apiData.imdbVotes || 'N/A',
        director: apiData.Director || 'N/A',
        actors: apiData.Actors || 'N/A',
        country: apiData.Country || 'N/A',
        runtime: apiData.Runtime || 'N/A',
        totalSeasons: apiData.totalSeasons || 'N/A',
        totalEpisodes: apiData.totalEpisodes || 'N/A',
        quality: quality,
        status: status,
        userRating: 0,
        season: apiData.Type === 'series' ? 1 : 0,
        episode: apiData.Type === 'series' ? 1 : 0,
        dateAdded: new Date().toISOString()
      };

      state.items.push(newItem);
      saveState();
      closeModal('addModal');
      state.selectedId = newItem.id;
      renderGrid();
      renderHero();
    }

    /* ===================== RENDERING ===================== */
    function renderGrid() {
      const grid = document.getElementById("mainGrid");
      const localQuery = document.getElementById("localSearchInput").value.toLowerCase();
      const qualityFilter = document.getElementById("qualityFilterSelect").value;
      const genreFilter = document.getElementById("genreFilterSelect").value;
      const sortBy = document.getElementById("sortSelect").value;

      let filtered = state.items.filter(item => {
        // Status & Type from state.filters
        if (state.filters.status !== 'all' && item.status !== state.filters.status) return false;
        if (state.filters.type !== 'all' && item.type !== state.filters.type) return false;
        
        // Quality & Genre from dropdowns
        if (qualityFilter !== 'all' && item.quality !== qualityFilter) return false;
        if (genreFilter !== 'all' && (!item.genre || !item.genre.includes(genreFilter))) return false;

        // Local Text Search
        if (localQuery) {
          const textToSearch = `${item.title} ${item.genre} ${item.year} ${item.quality} ${item.director}`.toLowerCase();
          if (!textToSearch.includes(localQuery)) return false;
        }
        return true;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'dateAdded') return new Date(b.dateAdded) - new Date(a.dateAdded);
        if (sortBy === 'title') return a.title.localeCompare(b.title);
        if (sortBy === 'imdb') return parseFloat(b.imdbRating || 0) - parseFloat(a.imdbRating || 0);
        if (sortBy === 'year') return parseInt(b.year) - parseInt(a.year);
        if (sortBy === 'userRating') return (b.userRating || 0) - (a.userRating || 0);
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-muted);">${t('emptyGrid')}</div>`;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const isSelected = item.id === state.selectedId ? 'selected' : '';
        const statusColor = item.status === 'Watching' ? 'var(--cyan)' : item.status === 'Completed' ? 'var(--green)' : 'var(--gold)';
        const progressStr = item.type === 'series' ? `<div style="font-size:11px; color:var(--cyan); margin-top:4px;">${t('season')} ${item.season} | ${t('episode')} ${item.episode}</div>` : '';
        const qualityBadge = item.quality !== 'نامشخص' ? `<div class="quality-badge-absolute">${item.quality}</div>` : '';

        return `
          <div class="movie-card ${isSelected}" onclick="selectCard('${item.id}')">
            <div class="card-poster-wrapper">
              ${qualityBadge}
              <img src="${item.poster !== 'N/A' ? item.poster : 'https://via.placeholder.com/200x300?text=No+Cover'}">
            </div>
            <div class="card-info">
              <h4 class="card-title">${item.title}</h4>
              <div>
                <div class="card-meta-line">
                  <span>${item.year}</span>
                  <span style="display:flex; align-items:center;">
                    ${item.status === 'Watching' ? t('statusWatching') : item.status === 'Planned' ? t('statusPlanned') : t('statusCompleted')}
                    <span class="status-dot" style="background:${statusColor}"></span>
                  </span>
                </div>
                ${progressStr}
                <div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;">
                  <span class="badge badge-imdb" style="font-size:10px; padding:2px 4px;">⭐ ${item.imdbRating}</span>
                  <span style="font-size:11px; color:var(--gold);">${item.userRating ? '★ '+item.userRating : ''}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectCard(id) {
      state.selectedId = id;
      renderGrid();
      renderHero();
      document.getElementById('heroSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

      container.innerHTML = `

          <img class="hero-poster" src="${item.poster !== 'N/A' ? item.poster : 'https://via.placeholder.com/300x450'}" alt="">
          <div class="hero-details">
            <h1 class="hero-title">${item.title}</h1>
            <div class="hero-meta">
              <span class="badge badge-accent">${item.status === 'Watching' ? t('statusWatching') : item.status === 'Planned' ? t('statusPlanned') : t('statusCompleted')}</span>
              <span class="badge">${item.year}</span>

            </div>

            <div class="hero-extended-info">
              <div class="extended-row"><strong>${t('genre')}:</strong> ${item.genre}</div>
              <div class="extended-row"><strong>${t('runtime')}:</strong> ${item.runtime}</div>
              <div class="extended-row"><strong>${t('director')}:</strong> ${item.director}</div>
              <div class="extended-row"><strong>${t('country')}:</strong> ${item.country}</div>
              <div class="extended-row" style="grid-column: 1/-1;"><strong>${t('actors')}:</strong> ${item.actors}</div>
            </div>

            <p class="hero-plot">${item.plot || t('plotEmpty')}</p>
            
            ${seriesProgressPanel}

            <div class="action-panel">
              <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                  <span style="font-size:13px;">${t('personalRating')}</span>
                  ${renderStars(item.userRating || 0)}

                    <option value="Completed" ${item.status === 'Completed' ? 'selected' : ''}>${t('statusCompleted')}</option>

    function renderWatchNext() {

      const watchingSeries = state.items.filter(i => i.status === "Watching" && i.type === "series");
      const plannedItems = state.items.filter(i => i.status === "Planned").sort((a,b) => parseFloat(b.imdbRating||0) - parseFloat(a.imdbRating||0));
      
      if (watchingSeries.length === 0 && plannedItems.length === 0) {
        container.innerHTML = `<p style="color:var(--text-muted); font-size:13px; text-align:center;">${t('emptyWatchNext')}</p>`;
        return;

      watchingSeries.slice(0, 2).forEach(s => {
        html += `
          <div style="background:var(--bg-card); border:1px solid var(--border); padding:15px; border-radius:var(--radius-md); display:flex; gap:15px; align-items:center;">
            <img src="${s.poster}" style="width:60px; height:90px; object-fit:cover; border-radius:4px;">

              <h4 style="font-size:14px; font-weight:700; color:#fff; margin-bottom:5px;">${s.title}</h4>
              <span class="badge badge-accent" style="font-size:10px;">🔥 ${t('watching')}</span>
              <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">${t('season')} ${s.season} - ${t('episode')} ${parseInt(s.episode) + 1} پیشنهادی</p>
            </div>
            <button class="btn btn-success" style="padding:8px 12px; font-size:12px;" onclick="incrementEpisode('${s.id}')">➕</button>

            <div style="flex:1;">
              <h4 style="font-size:14px; font-weight:700; color:#fff; margin-bottom:5px;">${p.title}</h4>

    /* ===================== INTERACTIONS & UPDATES ===================== */
    function setFilter(key, value) {
      if (key === 'status') { state.filters.status = value; state.filters.type = 'all'; } 
      else if (key === 'type') { state.filters.type = value; state.filters.status = 'all'; }
      
      document.querySelectorAll("#filterContainer .filter-btn").forEach(b => b.classList.remove("active"));
      event.target.classList.add("active");
      renderGrid();
    }

    function renderStars(currentRating) {
      let html = '<div class="stars-rating">';
      for (let i = 1; i <= 10; i++) {
        html += `<span class="${i <= currentRating ? 'active' : ''}" onclick="setRating(${i})">★</span>`;
      }
      html += '</div>';
      return html;
    }

    function setRating(rating) {
      const item = state.items.find(i => i.id === state.selectedId);
      if (item) { item.userRating = rating; saveState(); renderHero(); renderGrid(); }
    }

    function updateItemQuality(id, newQuality) {
      const item = state.items.find(i => i.id === id);
      if(item) { item.quality = newQuality; saveState(); renderGrid(); renderHero(); }
    }

    function updateItemStatus(id, newStatus) {
      const item = state.items.find(i => i.id === id);
      if(item) { item.status = newStatus; saveState(); renderGrid(); renderHero(); renderWatchNext(); }
    }

    function deleteItem(id) {
      if (confirm("Are you sure? / مطمئن هستید؟")) {
        state.items = state.items.filter(i => i.id !== id);
        if (state.selectedId === id) state.selectedId = null;
        saveState(); renderGrid(); renderHero(); renderWatchNext();
      }
    }

    function quickStart(id) {
      updateItemStatus(id, 'Watching');
      selectCard(id);
    }

    function incrementEpisode(id) {
      const item = state.items.find(i => i.id === id);
      if (item) {
        item.episode = parseInt(item.episode || 1) + 1;
        saveState(); renderHero(); renderGrid(); renderWatchNext();
      }
    }

    function openProgressModal(id) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;
      const content = document.getElementById("progressModalContent");
      content.innerHTML = `
        <div style="display:flex; gap:15px; margin-bottom:15px;">
          <div class="form-group" style="flex:1;">
            <label>${t('season')}:</label>
            <input type="number" id="modalSeason" class="form-control" value="${item.season || 1}" min="1">
          </div>
          <div class="form-group" style="flex:1;">
            <label>${t('episode')}:</label>
            <input type="number" id="modalEpisode" class="form-control" value="${item.episode || 1}" min="1">
          </div>
        </div>
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:20px;">
          ${t('totalSea')}: ${item.totalSeasons || 'N/A'} | ${t('totalEp')}: ${item.totalEpisodes || 'N/A'}
        </p>
        <button class="btn btn-success" style="width:100%;" onclick="saveProgress('${item.id}')">💾 ${t('save')}</button>
      `;
      openModal("progressModal");
    }

    function saveProgress(id) {
      const item = state.items.find(i => i.id === id);
      if (item) {
        item.season = parseInt(document.getElementById("modalSeason").value) || 1;
        item.episode = parseInt(document.getElementById("modalEpisode").value) || 1;
        saveState(); closeModal("progressModal"); renderHero(); renderGrid(); renderWatchNext();
      }
    }

    /* ===================== UTILS & SETTINGS ===================== */
    function openModal(id) { document.getElementById(id).classList.add("active"); }
    function closeModal(id) { document.getElementById(id).classList.remove("active"); }

    function saveGeneralNotes(val) { localStorage.setItem("cinetrack_general_notes", val); }

    function saveSettings() {
      state.language = document.getElementById("languageSelect").value;
      state.tmdbKey = document.getElementById("tmdbKeyInput").value.trim();
      localStorage.setItem("cinetrack_language", state.language);
      localStorage.setItem("cinetrack_tmdb_key", state.tmdbKey);
      
      applyLanguage();
      extractAndRenderGenres();
      renderGrid();
      if(state.selectedId) renderHero();
      closeModal('settingsModal');
    }

    function exportLibrary() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.items, null, 2));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", `cinetrack_backup_${new Date().getTime()}.json`);
      document.body.appendChild(dl); dl.click(); dl.remove();
    }

    function importLibrary(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (Array.isArray(parsed)) {
            state.items = parsed; saveState(); init();
            alert("Backup imported successfully. / بکاپ با موفقیت وارد شد.");
            closeModal('settingsModal');
          }
        } catch (err) { alert("Invalid backup file. / فایل بکاپ نامعتبر است."); }
      };
      reader.readAsText(file);
    }

    window.onload = init;
  </script>
</body>
</html>
